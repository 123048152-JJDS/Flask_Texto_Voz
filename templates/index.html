<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎧 Texto a Voz · Flask</title>
    <!-- Fuente Poppins de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Nuestro CSS externo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="card">
        <h1>
            <i class="fas fa-waveform"></i> 
            Texto a Voz
        </h1>
        <div class="sub">
            Escribe algo y escúchalo al instante
        </div>

        <form id="formulario">
            <div class="input-group">
                <label for="texto"><i class="far fa-keyboard"></i> Tu mensaje</label>
                <div class="input-wrapper">
                    <i class="fas fa-pencil-alt"></i>
                    <input type="text" id="texto" name="texto" placeholder="Ej: Hola, ¿cómo estás?" required>
                </div>
            </div>
            <button type="submit">
                <i class="fas fa-play"></i> 
                Reproducir voz
            </button>
        </form>

        <!-- Sección de audio (oculta hasta que se genere) -->
        <div class="audio-section" id="audioSection" style="display: none;">
            <div class="audio-header">
                <i class="fas fa-headphones-alt"></i>
                <span>Tu audio está listo</span>
            </div>
            <audio id="reproductor" controls></audio>
        </div>

        <div class="footer-note">
            <i class="fas fa-microchip"></i> Flask + gTTS · Voz en español
        </div>
    </div>

    <script>
        document.getElementById('formulario').onsubmit = async function(e) {
            e.preventDefault();
            const texto = document.getElementById('texto').value.trim();
            if (!texto) return;

            const button = document.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generando...';
            button.disabled = true;

            try {
                const response = await fetch('/procesar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'texto=' + encodeURIComponent(texto)
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const audio = document.getElementById('reproductor');
                    const audioSection = document.getElementById('audioSection');
                    
                    audio.src = url;
                    audioSection.style.display = 'block';
                    audio.play();
                } else {
                    alert('Error al generar el audio');
                }
            } catch (error) {
                alert('Error de conexión');
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        };
    </script>
</body>
</html>
